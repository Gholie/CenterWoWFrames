<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 400" width="400" height="400">
  <defs>
    <linearGradient id="bgGrad" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#0d0d1c"/>
      <stop offset="100%" stop-color="#060610"/>
    </linearGradient>
    <filter id="glow">
      <feGaussianBlur stdDeviation="2" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
    <marker id="arrowGold" markerWidth="8" markerHeight="6" refX="7" refY="3" orient="auto">
      <polygon points="0 0, 8 3, 0 6" fill="#c8a84b"/>
    </marker>
  </defs>

  <!-- Background -->
  <rect width="400" height="400" fill="url(#bgGrad)" rx="8"/>

  <!-- ===== LEFT FRAME (32:9) — center (100, 200) ===== -->
  <rect x="25" y="179" width="150" height="42" fill="#0f0f22" stroke="#c8a84b" stroke-width="2"/>
  <!-- Corner ornaments -->
  <polyline points="25,193 25,179 39,179" fill="none" stroke="#e8c060" stroke-width="2"/>
  <polyline points="161,179 175,179 175,193" fill="none" stroke="#e8c060" stroke-width="2"/>
  <polyline points="25,207 25,221 39,221" fill="none" stroke="#e8c060" stroke-width="2"/>
  <polyline points="161,221 175,221 175,207" fill="none" stroke="#e8c060" stroke-width="2"/>
  <!-- Inner dashed border -->
  <rect x="31" y="185" width="138" height="30" fill="none" stroke="#c8a84b" stroke-width="0.5" stroke-opacity="0.35" stroke-dasharray="5,4"/>
  <!-- Crosshair -->
  <line x1="100" y1="181" x2="100" y2="219" stroke="#e8c060" stroke-width="0.8" stroke-opacity="0.65" stroke-dasharray="4,3"/>
  <line x1="33" y1="200" x2="167" y2="200" stroke="#e8c060" stroke-width="0.8" stroke-opacity="0.65" stroke-dasharray="4,3"/>
  <!-- Center marker -->
  <circle cx="100" cy="200" r="5" fill="none" stroke="#e8c060" stroke-width="1.5" filter="url(#glow)"/>
  <circle cx="100" cy="200" r="2" fill="#e8c060" filter="url(#glow)"/>
  <!-- Ratio label -->
  <text x="100" y="240" text-anchor="middle" font-family="monospace" font-size="12" fill="#c8a84b" opacity="0.85">32:9</text>

  <!-- ===== ARROW ===== -->
  <line x1="186" y1="200" x2="226" y2="200" stroke="#c8a84b" stroke-width="2" marker-end="url(#arrowGold)"/>

  <!-- ===== RIGHT FRAME (16:9) — center (285, 200) ===== -->
  <rect x="235" y="172" width="100" height="56" fill="#0f0f22" stroke="#c8a84b" stroke-width="2"/>
  <!-- Corner ornaments -->
  <polyline points="235,183 235,172 246,172" fill="none" stroke="#e8c060" stroke-width="2"/>
  <polyline points="324,172 335,172 335,183" fill="none" stroke="#e8c060" stroke-width="2"/>
  <polyline points="235,217 235,228 246,228" fill="none" stroke="#e8c060" stroke-width="2"/>
  <polyline points="324,228 335,228 335,217" fill="none" stroke="#e8c060" stroke-width="2"/>
  <!-- Inner dashed border -->
  <rect x="241" y="178" width="88" height="44" fill="none" stroke="#c8a84b" stroke-width="0.5" stroke-opacity="0.35" stroke-dasharray="4,4"/>
  <!-- Crosshair -->
  <line x1="285" y1="174" x2="285" y2="226" stroke="#e8c060" stroke-width="0.8" stroke-opacity="0.65" stroke-dasharray="4,3"/>
  <line x1="243" y1="200" x2="327" y2="200" stroke="#e8c060" stroke-width="0.8" stroke-opacity="0.65" stroke-dasharray="4,3"/>
  <!-- Center marker -->
  <circle cx="285" cy="200" r="5" fill="none" stroke="#e8c060" stroke-width="1.5" filter="url(#glow)"/>
  <circle cx="285" cy="200" r="2" fill="#e8c060" filter="url(#glow)"/>
  <!-- Ratio label -->
  <text x="285" y="240" text-anchor="middle" font-family="monospace" font-size="12" fill="#c8a84b" opacity="0.85">16:9</text>

  <!-- ===== TITLE ===== -->
  <text x="200" y="310" text-anchor="middle" font-family="Georgia, 'Times New Roman', serif" font-size="19" fill="#c8a84b" letter-spacing="1.5" filter="url(#glow)">CenterWoWFrames</text>
  <text x="200" y="328" text-anchor="middle" font-family="sans-serif" font-size="9.5" fill="#c8a84b" opacity="0.55" letter-spacing="2">UI FRAME ASPECT RATIO TOOL</text>
</svg>
