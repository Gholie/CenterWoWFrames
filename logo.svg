<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 220" width="400" height="220">
  <defs>
    <linearGradient id="bgGrad" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#0d0d1c"/>
      <stop offset="100%" stop-color="#060610"/>
    </linearGradient>
    <filter id="glow">
      <feGaussianBlur stdDeviation="2" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
    <marker id="arrowGold" markerWidth="8" markerHeight="6" refX="7" refY="3" orient="auto">
      <polygon points="0 0, 8 3, 0 6" fill="#c8a84b"/>
    </marker>
  </defs>

  <!-- Background -->
  <rect width="400" height="220" fill="url(#bgGrad)" rx="8"/>

  <!-- ===== LEFT FRAME (32:9) ===== -->
  <rect x="25" y="79" width="150" height="42" fill="#0f0f22" stroke="#c8a84b" stroke-width="2"/>
  <!-- Corner ornaments -->
  <polyline points="25,93 25,79 39,79" fill="none" stroke="#e8c060" stroke-width="2"/>
  <polyline points="161,79 175,79 175,93" fill="none" stroke="#e8c060" stroke-width="2"/>
  <polyline points="25,107 25,121 39,121" fill="none" stroke="#e8c060" stroke-width="2"/>
  <polyline points="161,121 175,121 175,107" fill="none" stroke="#e8c060" stroke-width="2"/>
  <!-- Inner dashed border -->
  <rect x="31" y="85" width="138" height="30" fill="none" stroke="#c8a84b" stroke-width="0.5" stroke-opacity="0.35" stroke-dasharray="5,4"/>
  <!-- Crosshair -->
  <line x1="100" y1="81" x2="100" y2="119" stroke="#e8c060" stroke-width="0.8" stroke-opacity="0.65" stroke-dasharray="4,3"/>
  <line x1="33" y1="100" x2="167" y2="100" stroke="#e8c060" stroke-width="0.8" stroke-opacity="0.65" stroke-dasharray="4,3"/>
  <!-- Center marker -->
  <circle cx="100" cy="100" r="5" fill="none" stroke="#e8c060" stroke-width="1.5" filter="url(#glow)"/>
  <circle cx="100" cy="100" r="2" fill="#e8c060" filter="url(#glow)"/>
  <!-- Ratio label -->
  <text x="100" y="140" text-anchor="middle" font-family="monospace" font-size="12" fill="#c8a84b" opacity="0.85">32:9</text>

  <!-- ===== ARROW ===== -->
  <line x1="186" y1="100" x2="226" y2="100" stroke="#c8a84b" stroke-width="2" marker-end="url(#arrowGold)"/>

  <!-- ===== RIGHT FRAME (16:9) ===== -->
  <rect x="235" y="72" width="100" height="56" fill="#0f0f22" stroke="#c8a84b" stroke-width="2"/>
  <!-- Corner ornaments -->
  <polyline points="235,83 235,72 246,72" fill="none" stroke="#e8c060" stroke-width="2"/>
  <polyline points="324,72 335,72 335,83" fill="none" stroke="#e8c060" stroke-width="2"/>
  <polyline points="235,117 235,128 246,128" fill="none" stroke="#e8c060" stroke-width="2"/>
  <polyline points="324,128 335,128 335,117" fill="none" stroke="#e8c060" stroke-width="2"/>
  <!-- Inner dashed border -->
  <rect x="241" y="78" width="88" height="44" fill="none" stroke="#c8a84b" stroke-width="0.5" stroke-opacity="0.35" stroke-dasharray="4,4"/>
  <!-- Crosshair -->
  <line x1="285" y1="74" x2="285" y2="126" stroke="#e8c060" stroke-width="0.8" stroke-opacity="0.65" stroke-dasharray="4,3"/>
  <line x1="243" y1="100" x2="327" y2="100" stroke="#e8c060" stroke-width="0.8" stroke-opacity="0.65" stroke-dasharray="4,3"/>
  <!-- Center marker -->
  <circle cx="285" cy="100" r="5" fill="none" stroke="#e8c060" stroke-width="1.5" filter="url(#glow)"/>
  <circle cx="285" cy="100" r="2" fill="#e8c060" filter="url(#glow)"/>
  <!-- Ratio label -->
  <text x="285" y="140" text-anchor="middle" font-family="monospace" font-size="12" fill="#c8a84b" opacity="0.85">16:9</text>

  <!-- ===== TITLE ===== -->
  <text x="200" y="175" text-anchor="middle" font-family="Georgia, 'Times New Roman', serif" font-size="19" fill="#c8a84b" letter-spacing="1.5" filter="url(#glow)">CenterWoWFrames</text>
  <text x="200" y="193" text-anchor="middle" font-family="sans-serif" font-size="9.5" fill="#c8a84b" opacity="0.55" letter-spacing="2">UI FRAME ASPECT RATIO TOOL</text>
</svg>
